name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: input
    id: ubuntu
    attributes:
      label: Ubuntu version
      placeholder: "e.g. Ubuntu 24.04.1 LTS"
    validations:
      required: true
  - type: input
    id: gnome
    attributes:
      label: GNOME Shell version
      placeholder: "gnome-shell --version"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
  - type: textarea
    id: logs
    attributes:
      label: Terminal output
      render: shell
